# Petstore API v2 — Contains 5 breaking changes vs petstore-v1.yaml.
#
# Breaking changes introduced:
#   1. ENDPOINT REMOVED: /pets/{petId}/vaccinations is gone
#   2. TYPE CHANGED: Pet.tag went from string to object
#   3. REQUIRED PARAM ADDED: GET /pets now requires "status" query param
#   4. FIELD REMOVED: Pet.nickname was deleted
#   5. ENUM VALUE REMOVED: Pet.status lost "reserved"
#
# Run: delimit lint petstore-v1.yaml petstore-v2.yaml
openapi: "3.0.3"
info:
  title: Petstore API
  version: "2.0.0"
  description: A simple pet store API — v2 with breaking changes for demo purposes.
  contact:
    name: Petstore Team
    email: team@petstore.example.com
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      description: Returns a paginated list of pets in the store.
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return (1-100).
          required: false
          schema:
            type: integer
            default: 20
        # BREAKING CHANGE 3: new required query parameter
        - name: status
          in: query
          description: Filter by pet status. Now required.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      summary: Create a pet
      description: Add a new pet to the store inventory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: Pet created successfully.
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      description: Retrieve a single pet by its unique identifier.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single pet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found.
  # BREAKING CHANGE 1: /pets/{petId}/vaccinations endpoint removed entirely.
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique identifier for the pet.
        name:
          type: string
          description: Display name of the pet.
        # BREAKING CHANGE 2: tag changed from string to object.
        tag:
          type: object
          description: Structured tag with key-value metadata.
          properties:
            key:
              type: string
            value:
              type: string
        # BREAKING CHANGE 4: nickname field removed entirely.
        # BREAKING CHANGE 5: "reserved" removed from status enum.
        status:
          type: string
          description: Availability status in the store.
          enum:
            - available
            - pending
            - sold
