# Petstore API v1 — Classic, clean, well-documented baseline spec.
# Use as the "old" spec when demoing breaking change detection with petstore-v2.yaml.
openapi: "3.0.3"
info:
  title: Petstore API
  version: "1.0.0"
  description: A simple pet store API for managing pets and their inventory.
  contact:
    name: Petstore Team
    email: team@petstore.example.com
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      description: Returns a paginated list of pets in the store.
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return (1-100).
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: A list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      summary: Create a pet
      description: Add a new pet to the store inventory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: Pet created successfully.
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      description: Retrieve a single pet by its unique identifier.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single pet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found.
  # This endpoint is removed in v2 — a breaking change.
  /pets/{petId}/vaccinations:
    get:
      operationId: listVaccinations
      summary: List vaccinations for a pet
      description: Returns the vaccination history for a specific pet.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vaccination records.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    vaccine:
                      type: string
                    date:
                      type: string
                      format: date
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique identifier for the pet.
        name:
          type: string
          description: Display name of the pet.
        # This field changes from string to object in v2 — breaking.
        tag:
          type: string
          description: A freeform tag for categorization.
        # This field is removed in v2 — breaking.
        nickname:
          type: string
          description: An optional nickname.
        # The enum loses a value in v2 — breaking.
        status:
          type: string
          description: Availability status in the store.
          enum:
            - available
            - pending
            - sold
            - reserved
