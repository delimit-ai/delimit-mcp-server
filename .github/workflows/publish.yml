name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write   # Needed for GitHub Release creation
  id-token: write   # Required for npm provenance

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Pre-publish Validation
    steps:
      - name: Checkout npm-delimit
        uses: actions/checkout@v4
        with:
          path: npm-delimit

      - name: Checkout delimit-gateway
        uses: actions/checkout@v4
        with:
          repository: delimit-ai/delimit-gateway
          token: ${{ secrets.GATEWAY_TOKEN }}
          path: delimit-gateway

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: npm-delimit
        run: npm install

      - name: Sync gateway
        working-directory: npm-delimit
        env:
          GATEWAY_OVERRIDE: ${{ github.workspace }}/delimit-gateway
        run: |
          # The sync script looks for /home/delimit/delimit-gateway by default.
          # In CI we override via env var or symlink.
          GATEWAY_OVERRIDE="${{ github.workspace }}/delimit-gateway" npm run sync-gateway

      - name: Set up Python (LED-1259 compile)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Nuitka (LED-1259 compile)
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'nuitka==2.5.9'

      - name: Test license_core .so (LED-1259)
        working-directory: npm-delimit
        run: bash scripts/test-license-core-so.sh
        env:
          GATEWAY_OVERRIDE: ${{ github.workspace }}/delimit-gateway

      - name: Compile license_core to native .so (LED-1259)
        working-directory: npm-delimit
        run: bash scripts/build-license-core.sh

      - name: Run tests
        working-directory: npm-delimit
        run: npm test

      - name: Check version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: npm-delimit
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Security check
        working-directory: npm-delimit
        run: bash scripts/security-check.sh

      - name: Audit dependencies
        working-directory: npm-delimit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in package
        working-directory: npm-delimit
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-list.txt
          # Check for actual secret files by extension or exact name.
          # Previous approach grepped for substrings like "secret" and ".key"
          # which false-positived on module names (secrets_broker.py,
          # key_resolver.py, security-check.sh).
          FAILED=0
          for pattern in '\.env$' '\.env\.' 'credentials\.json' '\.npmrc' '\.key$' '\.pem$' '\.p12$' '\.pfx$'; do
            if grep -iE "$pattern" /tmp/pack-list.txt; then
              echo "::error::Potential secret file found in package matching: $pattern"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi

  publish:
    needs: validate
    runs-on: ubuntu-latest
    name: Publish
    steps:
      - name: Checkout npm-delimit
        uses: actions/checkout@v4
        with:
          path: npm-delimit

      - name: Checkout delimit-gateway
        uses: actions/checkout@v4
        with:
          repository: delimit-ai/delimit-gateway
          token: ${{ secrets.GATEWAY_TOKEN }}
          path: delimit-gateway

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Intentionally NO registry-url: setup-node@v4 + registry-url writes a
          # temp .npmrc with `always-auth` and a DUMMY NODE_AUTH_TOKEN placeholder
          # (XXXXX-XXXXX-XXXXX-XXXXX) when no real token env is provided. npm then
          # authenticates with that garbage token and OIDC trusted publishing is
          # never attempted -> E404 on publish. npm defaults to registry.npmjs.org
          # already, and OIDC auth needs no .npmrc token. (v4.7.1 first attempt.)

      - name: Install dependencies
        working-directory: npm-delimit
        run: npm install

      - name: Sync gateway
        working-directory: npm-delimit
        run: |
          if [ ! -d /home/delimit/delimit-gateway/ai ]; then
            sed -i "s|/home/delimit/delimit-gateway|${{ github.workspace }}/delimit-gateway|g" scripts/sync-gateway.sh
          fi
          npm run sync-gateway

      - name: Set up Python (LED-1259 compile)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Nuitka (LED-1259 compile)
        # prepublishOnly runs sync-gateway then build-license-core.sh so the
        # .so is generated AFTER rsync and is the artifact npm pack picks up.
        # nuitka must be importable when prepublishOnly fires.
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'nuitka==2.5.9'

      - name: Upgrade npm for OIDC trusted publishing (>= 11.5.1)
        # Node 20 ships npm 10.x, which does not understand the OIDC trusted-
        # publishing handshake. npm >= 11.5.1 is required. We upgrade npm only
        # (rather than bumping the Node version) to leave the Nuitka/license_core
        # build environment untouched. Pinned to ^11 (not @latest) so a future
        # npm major can't silently change CI publish behavior; 11.x is >= 11.5.1.
        run: npm install -g npm@^11

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        working-directory: npm-delimit
        run: npm publish --dry-run

      - name: Publish to npm
        # Trusted Publishing (OIDC): no NODE_AUTH_TOKEN. Auth comes from the
        # id-token: write OIDC handshake against the npm trusted-publisher config
        # for this repo+workflow. Provenance is generated automatically; we keep
        # --provenance explicit. REQUIRES a trusted publisher configured on
        # npmjs.com (delimit-cli -> GitHub Actions, repo delimit-ai/delimit-mcp-server,
        # workflow publish.yml) BEFORE the next publish, or auth fails.
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
        working-directory: npm-delimit
        run: npm publish --provenance --access public

      - name: Verify published version
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: npm-delimit
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          # Registry propagation can take 30-90s after publish. Retry with
          # bounded backoff instead of racing a fixed 10s sleep (v4.3.4 hit
          # E404 on the 10s path even though the publish had succeeded).
          for attempt in 1 2 3 4 5 6; do
            if npm view "delimit-cli@$PKG_VERSION" version; then
              echo "verified on attempt $attempt"
              exit 0
            fi
            echo "attempt $attempt: not visible yet, sleeping $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::delimit-cli@$PKG_VERSION not visible in registry after 6 attempts (~5min)"
          exit 1

  release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: GitHub Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
