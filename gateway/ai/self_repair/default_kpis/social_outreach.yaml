# Function KPI declaration — marketing.social_outreach
#
# LED-216 Phase 1 (panel-deliberated 2026-05-02, unanimous): break out the
# old `drafts_per_day` / `drafts_per_week` global floors into per-platform
# floors. Platform-shaped KPIs let the watcher detect "twitter is dead"
# while reddit is healthy, which the prior aggregate masked.
#
# Floors (minimum-acceptable) and ceilings (maximum-acceptable) trigger a
# `function_breach` event. Sources reference real ~/.delimit/ files so the
# watcher can compute these without new instrumentation.

version: 1
function: marketing.social_outreach
description: |
  Drafts and posts outreach across X (twitter), Reddit, HN, dev.to,
  GitHub. Drafts are routed through delimit_notify to the founder inbox
  for approval-gated posting. Per-platform floors (LED-216) replace the
  aggregate "drafts_per_day" KPI so we can detect single-platform
  outages without a global throughput collapse.

# Data sources the watcher will read.
sources:
  drafts: ~/.delimit/social_drafts.jsonl
  posts: ~/.delimit/social_log.jsonl
  owner_actions: ~/.delimit/owner_actions.jsonl
  notifications: ~/.delimit/notifications.jsonl
  external:
    # Engagement attribution requires post-side instrumentation we don't
    # have yet. Deferred KPIs marked below; floor=null means
    # "not measured in v1".
    twitter_replies: null
    reddit_replies: null
    devto_engagement: null

# KPIs evaluated on a sliding window. `severity: critical` trips notify+escalation;
# `severity: warning` trips notify only; `severity: info` is logged but not paged.
# Each KPI carries:
#   id           — stable identifier (LED-216 contract)
#   name         — alias of id, required by the existing kpi.py evaluator
#   description  — human-readable purpose (LED-216 contract)
#   measure      — DSL expression evaluated by ai/self_repair/kpi.py
#   window       — duration string (24h, 7d, …) parsed by parse_window()
#   floor/ceiling — threshold for breach detection
#   severity     — info / warning / critical
#   rationale    — fallback long-form description (used by breach reports)

kpis:

  # ─── Per-platform throughput floors (LED-216) ─────────────────────────

  - id: x_drafts_per_day
    name: x_drafts_per_day
    description: "Twitter/X drafts produced per 24h."
    measure: count(drafts where platform=twitter)
    window: 24h
    floor: 16
    severity: warning
    rationale: |
      Twitter is the primary distribution channel. Sub-16 drafts/day
      means the X drafter is partly dead — autopost cap depends on
      this floor being healthy. Below it, ramp pauses.

  - id: x_autoposts_per_day
    name: x_autoposts_per_day
    description: "Autoposted Twitter posts per 24h (subset of drafts that posted)."
    measure: count(posts where platform=twitter)
    window: 24h
    floor: 8
    severity: warning
    rationale: |
      Phase 1 cap is 8/day; ramps to 12 after 14d clean account-health.
      Below 8, the autoposter has stalled or the approval loop is
      backed up.

  - id: x_manual_reply_candidates_per_day
    name: x_manual_reply_candidates_per_day
    description: "Manual-approval X reply candidates produced per 24h (founder posts)."
    measure: count(drafts where platform=twitter)
    window: 24h
    floor: 5
    severity: info
    rationale: |
      Reply candidates that route to the founder for manual posting. The
      measure currently overcounts (it shares the twitter drafts source);
      v1.1 will narrow on a `delivery_mode='manual'` field once that ships.

  - id: reddit_drafts_per_day
    name: reddit_drafts_per_day
    description: "Reddit community-post drafts per 24h, varied subreddit."
    measure: count(drafts where platform=reddit)
    window: 24h
    floor: 1
    severity: warning
    rationale: |
      Reddit drafts are slower-cadence than X but a dead Reddit drafter
      for a full day is structural (subreddit detection broken, ratelimit,
      etc.).

  - id: github_reply_drafts_per_week
    name: github_reply_drafts_per_week
    description: "GitHub reply drafts on external issues/PRs per 7d."
    measure: count(drafts where platform=github)
    window: 7d
    floor: 3
    severity: info
    rationale: |
      External GitHub outreach (issue replies + PR comments). Lower
      cadence; a week with <3 means the sensing layer is missing
      relevant repos.

  - id: hn_originals_per_week
    name: hn_originals_per_week
    description: "Hacker News original-post drafts per 7d (manual approval)."
    measure: count(drafts where platform=hn)
    window: 7d
    floor: 2
    severity: info
    rationale: |
      HN originals are high-leverage but rare. Floor=2/week keeps the
      drafter from going dormant.

  - id: devto_originals_per_week
    name: devto_originals_per_week
    description: "dev.to original-post drafts per 7d (manual approval)."
    measure: count(drafts where platform=devto)
    window: 7d
    floor: 2
    severity: info
    rationale: |
      dev.to originals — same posture as HN: rare but should not flatline.

  # ─── Cross-platform diversity (retained from v1) ──────────────────────

  - name: draft_diversity
    measure: count(distinct platform) where ts >= now - window
    window: 7d
    floor: 3
    severity: warning
    rationale: |
      Should hit ≥3 of {twitter, reddit, hn, devto, github} per week.
      Dropping below means a platform integration is silently broken.

  # ─── Outcome / engagement (drafts are converting to action) ──────────

  - name: founder_approval_rate
    measure: count(owner_actions where status=approved) / count(owner_actions)
    window: 14d
    floor: 0.30
    severity: warning
    rationale: |
      If <30% of drafts are founder-approved, the drafter is consistently
      missing the founder's bar. Either the prompt is wrong or the targets
      are wrong. Triggers diagnose to identify the pattern.

  - name: founder_rejection_rate
    measure: count(owner_actions where status=rejected) / count(owner_actions)
    window: 14d
    ceiling: 0.40
    severity: warning
    rationale: |
      Inverse of the approval rate but framed as a ceiling so the watcher
      catches both "low approve" AND "high reject" signals (different patterns
      in mixed-acknowledgment scenarios).

  - name: post_to_draft_ratio
    measure: count(posts) / count(drafts)
    window: 14d
    floor: 0.10
    severity: warning
    rationale: |
      Drafts that never reach posted state indicate the funnel is broken:
      either approvals aren't routing back, or posts are failing silently.

  # ─── Negative signals (zero tolerance) ────────────────────────────────

  - name: spam_flag_rate
    measure: count(posts where spam_flag=true) / count(posts)
    window: 30d
    ceiling: 0.0
    severity: critical
    rationale: |
      Any community spam-flag is a trust event. Self-repair should pause
      the function and surface the flag to founder immediately. Prowlarr-class
      incident.

  - name: duplicate_target_rate
    measure: count(drafts where target_id in (last_30d_targets)) / count(drafts)
    window: 7d
    ceiling: 0.10
    severity: warning
    rationale: |
      We should not be re-posting to the same target within 30 days. The
      external_pr_check rule already enforces this for PRs; this catches the
      same drift on social.

# Outcome KPIs deferred to v1.1 (require post-side instrumentation):
#   reply_rate         — needs platform reply-polling
#   click_through      — needs short-link analytics
#   pilot_signup_attrib — needs UTM tracking + signup funnel
#
# These are the highest-value KPIs but also the hardest to measure. Logging
# them as gaps so we don't pretend the loop is closed when it's not.

# Pre-flight escalation hard-stops (sourced from 2026-04-07 ruleset-bypass postmortem).
# The self-repair loop CANNOT propose these even if the panel verdict suggests them.
# Apply gate trips kernel and routes to founder with no auto-action.
escalation_class_hard_stops:
  - force_push_to_main
  - ruleset_bypass
  - branch_protection_bypass
  - account_switch  # infracore ↔ crypttrx
  - irreversible_capital_commit
  - scope_expansion_beyond_stated_function
  - mcp_tool_signature_change
  - cli_command_rename_or_remove
  - storage_format_change
  - clobber_user_customized_files
